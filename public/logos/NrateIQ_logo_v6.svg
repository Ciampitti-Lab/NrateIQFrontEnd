<svg width="100%" viewBox="0 0 350 350" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">NrateIQ Icon</title>
  <defs>
    

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hex-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181510"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>

    <linearGradient id="hex-small-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2010"/>
      <stop offset="100%" stop-color="#1a1408"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecdfa8"/>
      <stop offset="100%" stop-color="#b08840"/>
    </linearGradient>

    <linearGradient id="gold-iq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4eccc"/>
      <stop offset="100%" stop-color="#c9a55a"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <ellipse cx="170" cy="170" rx="130" ry="130" fill="url(#glow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main hexagon — centered in square canvas -->
  <!-- center 170,170 radius 118 -->
  <polygon points="170,52 272,111 272,229 170,288 68,229 68,111" fill="url(#hex-fill)" stroke="#c9a96e" stroke-width="1.5" stroke-opacity="0.6" style="stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner hex ring -->
  <polygon points="170,66 264,119 264,221 170,274 76,221 76,119" fill="none" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.15" style="fill:none;stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- "N" -->
  <text x="164" y="176" font-size="136" fill="url(#gold)" text-anchor="middle" dominant-baseline="central" letter-spacing="-2" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:136px;font-weight:800;text-anchor:middle;dominant-baseline:central">N</text>

  <!-- Small hexagon badge upper right — center ~(268, 96) radius 38 -->
  <polygon points="268,58 301,77 301,115 268,134 235,115 235,77" fill="url(#hex-small-fill)" stroke="#c9a96e" stroke-width="1.5" stroke-opacity="0.85" style="stroke:rgb(201, 169, 110);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- IQ inside small hex -->
  <text x="268" y="97" font-size="24" fill="url(#gold-iq)" text-anchor="middle" dominant-baseline="central" letter-spacing="1.5" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:24px;font-weight:700;text-anchor:middle;dominant-baseline:central">IQ</text>
</svg>